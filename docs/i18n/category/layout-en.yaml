- route: /docs/reference/layout/columns/
  title: Columns
  description: Documentation for the `columns` function.
  part: null
  outline:
  - id: summary
    name: Summary
    children: []
  - id: page-level
    name: Page Level
    children: []
  - id: breaking-out
    name: Breaking Out
    children: []
